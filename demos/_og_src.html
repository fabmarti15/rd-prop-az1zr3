<!doctype html><html lang="es"><head><meta charset="utf-8">
<style>
  :root{--b2c:#14b8a6;--b2cD:#0d9488;--b2b:#e0a838;--b2bD:#b7791f;--ink:#06141a;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  html,body{width:1200px;height:630px;overflow:hidden;}
  body{position:relative;background:radial-gradient(120% 130% at 18% -10%,#123c47 0%,#0a2630 46%,#06141a 100%);color:#eaf5f3;display:flex;flex-direction:column;justify-content:center;padding:64px 78px;}
  .glow{position:absolute;border-radius:50%;filter:blur(80px);}
  .g1{width:460px;height:460px;background:#14b8a6;left:-150px;top:-180px;opacity:.26;}
  .g2{width:420px;height:420px;background:#e0a838;right:-120px;bottom:-200px;opacity:.20;}
  .brand{display:flex;align-items:center;gap:14px;margin-bottom:30px;position:relative;z-index:2;}
  .brand .mk{width:52px;height:52px;border-radius:15px;background:linear-gradient(160deg,#2bb3a3,#0d9488);display:flex;align-items:center;justify-content:center;font-size:27px;}
  .brand b{font-size:26px;font-weight:800;letter-spacing:-.5px;color:#fff;}
  .brand .tg{font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#06141a;background:#fff;padding:6px 12px;border-radius:8px;}
  h1{font-size:66px;line-height:.98;font-weight:900;letter-spacing:-2px;color:#fff;margin-bottom:38px;position:relative;z-index:2;}
  .cards{display:flex;gap:22px;position:relative;z-index:2;margin-bottom:34px;}
  .card{flex:1;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.10);border-radius:20px;padding:26px 28px;backdrop-filter:blur(2px);}
  .card.b2c{border-top:5px solid var(--b2c);}
  .card.b2b{border-top:5px solid var(--b2b);}
  .card .tag{font-size:46px;font-weight:900;letter-spacing:-2px;line-height:1;}
  .card.b2c .tag{color:var(--b2c);} .card.b2b .tag{color:var(--b2b);}
  .card .big{font-size:30px;font-weight:800;color:#fff;margin-top:10px;letter-spacing:-.5px;}
  .card .desc{font-size:17px;font-weight:600;color:#a7c6c2;margin-top:7px;line-height:1.3;}
  .card .demo{display:inline-flex;align-items:center;gap:7px;margin-top:16px;font-size:14.5px;font-weight:800;padding:8px 14px;border-radius:999px;}
  .card.b2c .demo{color:var(--b2c);background:rgba(20,184,166,.13);border:1.5px solid #1d4a44;}
  .card.b2b .demo{color:var(--b2b);background:rgba(224,168,56,.13);border:1.5px solid #5a4a1d;}
  .lockline{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:800;color:#7fb8af;letter-spacing:.5px;text-transform:uppercase;position:relative;z-index:2;}
  .lockline .pad{font-size:20px;}
</style></head>
<body>
  <div class="glow g1"></div><div class="glow g2"></div>
  <div class="brand"><div class="mk">🌳</div><b>Propuesta de Negocio</b><span class="tg">RedArbor</span></div>
  <h1>Dos demos en vivo.</h1>
  <div class="cards">
    <div class="card b2c">
      <div class="tag">B2C</div>
      <div class="big">180M candidatos</div>
      <div class="desc">Certificaciones dentro del portal donde se contrata.</div>
      <span class="demo">▶ Ver demo B2C</span>
    </div>
    <div class="card b2b">
      <div class="tag">B2B</div>
      <div class="big">550.000 empresas</div>
      <div class="desc">Un nuevo SaaS sobre la base que ya factura.</div>
      <span class="demo">▶ Ver demo B2B</span>
    </div>
  </div>
  <div class="lockline"><span class="pad">🔒</span> Confidencial</div>
</body></html>
