<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>Propuesta · RedArbor</title>
<style>
  :root{--bg:#0c0f14;--ink:#eef2f7;--muted:#9aa6b5;--line:#1f2733;--card:#141a23;--accent:#4fd1c5;--b2b:#f0b429}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:8vh 6vw;gap:2.5rem}
  .eyebrow{text-transform:uppercase;letter-spacing:.22em;font-size:.78rem;color:var(--accent);font-weight:700}
  h1{font-size:clamp(2rem,5vw,3.4rem);font-weight:800;letter-spacing:-.02em;text-align:center;line-height:1.1}
  .head{display:flex;flex-direction:column;align-items:center;gap:.9rem;text-align:center}
  .sub{color:var(--muted);font-size:clamp(1.05rem,1.9vw,1.4rem);font-weight:500}
  .sub b{color:var(--accent);font-weight:700}
  .cards{display:flex;gap:1.6rem;flex-wrap:wrap;justify-content:center;width:100%;max-width:60rem}
  a.card{flex:1;min-width:16rem;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:2rem 2.1rem;transition:border-color .2s,transform .2s}
  a.card:hover{border-color:var(--accent);transform:translateY(-3px)}
  a.card.b2b:hover{border-color:var(--b2b)}
  .n{font-size:.8rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-weight:700;margin-bottom:.7rem}
  .t{font-size:clamp(1.4rem,2.4vw,1.9rem);font-weight:800;letter-spacing:-.01em;margin-bottom:.5rem}
  .d{color:var(--muted);font-size:1.05rem;line-height:1.4}
  .go{margin-top:1.2rem;color:var(--accent);font-weight:700;font-size:.95rem}
  .b2b .go{color:var(--b2b)}
  .foot{color:var(--muted);font-size:.8rem}
</style>
</head>
<body>
  <div class="head">
    <div class="eyebrow">Confidencial</div>
    <h1>Emprender desde RedArbor</h1>
    <p class="sub">Con la mira en un <b>exit billion</b>.</p>
  </div>
  <div class="cards">
    <a class="card" href="estructura.html">
      <div class="n">01</div>
      <div class="t">Propuesta de estructura</div>
      <div class="go">Abrir →</div>
    </a>
    <a class="card b2b" href="negocio.html">
      <div class="n">02</div>
      <div class="t">El Negocio</div>
      <div class="go">Abrir →</div>
    </a>
  </div>
  <div class="foot">Fabián · Daniel · Diego</div>
</body>
</html>
